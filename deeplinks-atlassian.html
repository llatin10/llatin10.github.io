<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Deep links (Atlassian doc)</title>
  <meta http-equiv="refresh" content="0; url=https://thefirstdigitalbankinsetup.atlassian.net/wiki/spaces/RD/pages/475794673/Deeplinks" />
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #fff;
      --text: #18181b;
      --muted: #71717a;
      --accent: #0d9488;
      --border: #e4e4e7;
      --link-bg: #ecfdf5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --card: #18181b;
        --text: #fafafa;
        --muted: #a1a1aa;
        --accent: #2dd4bf;
        --border: #27272a;
        --link-bg: #134e4a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      padding: max(12px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      font-size: 1.35rem;
      margin: 0 0 8px;
      font-weight: 700;
    }
    .lead {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 16px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    a.link-btn {
      display: block;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      background: var(--link-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      word-break: break-word;
    }
    a.link-btn small {
      display: block;
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Deep links (Atlassian doc)</h1>
  <p class="lead">Redirecting to Confluence. If you’re not logged in (or scripts are blocked), use the link below.</p>

  <div class="panel">
    <a class="link-btn" href="https://thefirstdigitalbankinsetup.atlassian.net/wiki/spaces/RD/pages/475794673/Deeplinks" rel="noopener noreferrer">
      Open “Deeplinks” (Atlassian)
      <small>https://thefirstdigitalbankinsetup.atlassian.net/wiki/spaces/RD/pages/475794673/Deeplinks</small>
    </a>
  </div>
</body>
</html>
